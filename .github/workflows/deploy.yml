name: Deploy AI Explorer to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Chỉ chạy một lần deploy tại một thời điểm
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  # Kiểm tra 21 phòng render sạch (không lỗi console) trước khi deploy.
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install

      - name: Check offline cache integrity (sw.js ASSETS)
        run: node tests/check-assets.mjs

      - name: Install Playwright (Chromium)
        run: npx playwright install --with-deps chromium

      - name: Serve app in background
        run: npx --yes http-server -p 8000 -c-1 . &

      - name: Wait for server
        run: npx --yes wait-on http://localhost:8000 --timeout 30000

      - name: Run smoke test (21 phòng)
        run: node tests/smoke.mjs

      - name: Test focus-trap ô tìm kiếm (a11y)
        run: node tests/focus-trap.mjs

      - name: Test PWA (service worker + toast cập nhật)
        run: node tests/pwa.mjs

  deploy:
    needs: test
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "."

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
